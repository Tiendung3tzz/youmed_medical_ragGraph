services:
  neo4j:
    image: neo4j:5.24-community
    container_name: youmed-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  backend:
    build:
      context: ./backend
    container_name: youmed-raggraph-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password
      NEO4J_DATABASE: neo4j
      FRONTEND_ORIGINS: http://localhost:3000,http://localhost:5173
    depends_on:
      - neo4j

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: youmed-raggraph-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  neo4j_data:
  neo4j_logs:
